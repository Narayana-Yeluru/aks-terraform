# =========================
# Yes, we use terraform plan as a what-if equivalent, and we separate it into a dedicated stage 
# before apply to ensure safe infrastructure changes. 
# =========================

name: AKS Dev Deployment with WhatIf (Terraform) 

on:
  workflow_dispatch:

jobs:

# =========================
# 1. PLAN (WHAT-IF)
# =========================
  plan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Upload Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: tfplan


# =========================
# 2. APPLY (DEPLOY)
# =========================
  apply:
    runs-on: ubuntu-latest
    needs: plan

    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Download Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
